name: Project CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://user:pass@localhost:3306/db"

      - name: Run frontend tests
        run: npx vitest run tests/test_cart_ui.test.tsx tests/test_filter.test.ts tests/test_finance_ui.test.tsx
        env:
          JWT_SECRET: "test-secret-for-ci"

  backend:
    name: Backend Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "mysql://user:pass@localhost:3306/db"

      - name: Run backend tests
        run: npx vitest run tests/test_auth.test.ts tests/test_checkout.test.ts tests/test_cart.test.ts tests/test_transactions.test.ts tests/test_validators.test.ts
        env:
          JWT_SECRET: "test-secret-for-ci"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
          if-no-files-found: ignore
